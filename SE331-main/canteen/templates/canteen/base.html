<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campus Canteen{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .food-card { transition: transform 0.3s; border-radius: 12px; }
        .food-card:hover { transform: translateY(-5px); }
        .price-tag { font-size: 1.4rem; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'canteen:home' %}">
                <i class="fas fa-utensils me-2"></i>Campus Canteen
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'canteen:home' %}">Home</a>
                <a class="nav-link" href="{% url 'canteen:menu' %}">Menu</a>
                <a class="nav-link" href="/admin/">Admin</a>
            </div>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Campus Food Pre-Order System</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
